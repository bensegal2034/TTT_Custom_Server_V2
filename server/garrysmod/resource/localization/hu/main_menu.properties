problem.mat_hdr_level=A HDR megvil\u00e1g\u00edt\u00e1s ki van kapcsolva. Bizonyos p\u00e1ly\u00e1kon nem lesz megvil\u00e1g\u00edt\u00e1s.
problem.mat_bumpmap=A buckalek\u00e9pez\u00e9s (bump mapping) ki van kapcsolva. Bizonyos modellek helytelen\u00fcl fognak kin\u00e9zni.
problem.mat_specular=A t\u00fckr\u00f6z\u0151d\u00e9sek ki vannak kapcsolva. Bizonyos modellek helytelen\u00fcl n\u00e9znek majd ki.
problem.voice_fadeouttime=A \u201evoice_fadeouttime\u201d be\u00e1ll\u00edt\u00e1s nem szabv\u00e1nyos \u00e9rt\u00e9kre van \u00e1ll\u00edtva. A hangos cseveg\u00e9st negat\u00edvan befoly\u00e1solhatja.
problem.mat_viewportscale=A \u201emat_viewportscale\u201d be\u00e1ll\u00edt\u00e1s egy apr\u00f3 \u00e9rt\u00e9kre van \u00e1ll\u00edtva. El\u0151fordulhat, hogy a j\u00e1t\u00e9k nem j\u00e1tszhat\u00f3.
problem.cl_speeds=A \u201ecl_forwardspeed\u201d, \u201ecl_sidespeed\u201d vagy \u201ecl_backspeed\u201d be\u00e1ll\u00edt\u00e1sok helytelenek, ami negat\u00edvan befoly\u00e1solhatja a j\u00e1t\u00e9kos mozg\u00e1s\u00e1t vagy a Vezet\u00e9s lehet\u0151s\u00e9get Sandbox m\u00f3dban.
problem.screen_res=\u00dagy t\u0171nik, hogy a k\u00e9perny\u0151felbont\u00e1s az aj\u00e1nlottn\u00e1l kisebb. Javasolt a monitorhoz ill\u0151 felbont\u00e1s kiv\u00e1laszt\u00e1sa a jobb \u00e9lm\u00e9ny \u00e9rdek\u00e9ben.
problem.mat_dxlevel=A DirectX szint a nem t\u00e1mogatott \u201e%i\u201d \u00e9rt\u00e9kre van \u00e1ll\u00edtva. Ez instabilit\u00e1st \u00e9s jelent\u0151s grafikai probl\u00e9m\u00e1kat eredm\u00e9nyezhet.
problem.missing_addon_file=\u00dagy t\u0171nik, hogy a(z) \u201e%s\u201d b\u0151v\u00edtm\u00e9ny let\u00f6lt\u00e9se nem siker\u00fclt, vagy hi\u00e1nyoznak f\u00e1jljai. Gy\u0151z\u0151dj meg arr\u00f3l, hogy elegend\u0151 lemezter\u00fcleted van, majd a probl\u00e9ma megold\u00e1s\u00e1hoz ellen\u0151rizd a j\u00e1t\u00e9kf\u00e1jlok \u00e9ps\u00e9g\u00e9t a Steamben.
problem.menu_cleanupgmas=N\u00e9h\u00e1ny nem haszn\u00e1lt b\u0151v\u00edtm\u00e9ny tal\u00e1lhat\u00f3. A t\u00e1rhely felszabad\u00edt\u00e1sa \u00e9rdek\u00e9ben aj\u00e1nlott t\u00f6r\u00f6lni \u0151ket.
problem.gmod_mcore_test=\u00c9rtes\u00edt\u00e9s\: A t\u00f6bbmagos renderel\u00e9s enged\u00e9lyezve. Ez a funkci\u00f3 m\u00e9g fejleszt\u00e9s alatt \u00e1ll, \u00e9s stabilit\u00e1si probl\u00e9m\u00e1kat okozhat. Ez a funkci\u00f3 automatikusan enged\u00e9lyezve van minden b\u00e9ta \u00e1gon.
problem.addon_download_failed=A(z) \u201e%s\u201d b\u0151v\u00edtm\u00e9ny let\u00f6lt\u00e9se sikertelen volt\: %s.\n\nEllen\u0151rizd a Steam Let\u00f6lt\u00e9sek r\u00e9szt, \u00e9s gy\u0151z\u0151dj meg r\u00f3la, hogy nincs hiba.
problem.addon_conflict=A(z) \u201e%s\u201d b\u0151v\u00edtm\u00e9ny val\u00f3sz\u00edn\u0171leg \u00fctk\u00f6zik a(z) \u201e%s\u201d b\u0151v\u00edtm\u00e9nnyel, mivel mindkett\u0151 a k\u00f6vetkez\u0151 f\u00e1jlokat tartalmazza\:\n\n%s

problem.no_hdr=Ez a GPU nem t\u00e1mogatja a magas dinamikatarom\u00e1ny\u00fa (HDR) megvil\u00e1g\u00edt\u00e1st. Bizonyos p\u00e1ly\u00e1kon nem lesz megvil\u00e1g\u00edt\u00e1s.
