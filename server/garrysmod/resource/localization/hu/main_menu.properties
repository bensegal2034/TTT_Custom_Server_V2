problems.generic_lua_error=\u00dagy t\u0171nik, hogy Ismeretlen eredet\u0171 Lua hib\u00e1kba futott\u00e1l. Nem tudtuk meg\u00e1llap\u00edtani, hogy honnan j\u00f6ttek.
problems.addon_lua_error=\u00dagy t\u0171nik, a(z) \u201e%s\u201d b\u0151v\u00edtm\u00e9ny Lua hib\u00e1kat okoz.\nA b\u0151v\u00edtm\u00e9ny elt\u00e1vol\u00edt\u00e1sa megoldhatja a probl\u00e9m\u00e1t.\nJelentsd a hib\u00e1kat a b\u0151v\u00edtm\u00e9ny k\u00e9sz\u00edt\u0151j\u00e9nek is, hogy jav\u00edthassa.
problems.workshop_lua_error=\u00dagy t\u0171nik, a(z) \u201e%s\u201d b\u0151v\u00edtm\u00e9ny Lua hib\u00e1kat okoz.\nA b\u0151v\u00edtm\u00e9ny elt\u00e1vol\u00edt\u00e1sa vagy kikapcsol\u00e1sa megoldhatja a probl\u00e9m\u00e1t.\nJelentsd a hib\u00e1kat a b\u0151v\u00edtm\u00e9ny k\u00e9sz\u00edt\u0151j\u00e9nek is, hogy jav\u00edthassa.
